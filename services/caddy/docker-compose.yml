services:
  caddy:
    # Pinned by default. Bump via CADDY_IMAGE_TAG in .env when a newer
    # release is needed. :latest avoided so a background pull cannot
    # drag in a breaking change.
    image: caddy:${CADDY_IMAGE_TAG:-2.8.4}
    container_name: bb-homelab-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Host bind-mounts on the HDD (Pattern Y, like n8n — issue #96).
      # /data holds the internal CA root + issued certs: losing it forces
      # every client device to re-trust, so it belongs on the durable HDD,
      # not the SD card. create_host_path: false is a fail-fast guard —
      # the HDD uses `nofail` in fstab, so a failed mount would otherwise
      # let Docker auto-create the source on the root filesystem and Caddy
      # would silently regenerate a brand-new CA. Refusing to create the
      # path makes the container fail to start instead.
      - type: bind
        source: /mnt/appdata/caddy/data
        target: /data            # certificates, ACME account, internal CA
        bind:
          create_host_path: false
      - type: bind
        source: /mnt/appdata/caddy/config
        target: /config          # auto-managed runtime config
        bind:
          create_host_path: false
    networks:
      - proxy
    # Caddy is the frontal reverse proxy (80/443) for the whole homelab, so
    # it gets a liveness probe like every backend. It hits the plain-HTTP
    # /healthz route defined in the Caddyfile (a localhost-only site), proving
    # the port-80 data plane is serving — more representative than pinging the
    # admin API. wget ships in the Alpine/busybox caddy image (as for n8n).
    # No depends_on to the backends: separate compose projects joined by the
    # external bb-homelab-proxy network, and depends_on does not cross them.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  proxy:
    # External network shared with every backend service (n8n, future
    # Jellyfin / Kuma / etc.). Must be created once by hand on the host:
    #   docker network create bb-homelab-proxy
    # External-first design so Caddy and the backend services can be
    # torn down / upgraded independently without losing the shared bridge.
    name: bb-homelab-proxy
    external: true
