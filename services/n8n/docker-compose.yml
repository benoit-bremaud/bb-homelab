services:
  # n8n — workflow orchestrator. See services/n8n/README.md for the full
  # design rationale (host-only port binding, cloudflared in host
  # networking mode, MTU tweak, etc.).
  n8n:
    # Pinned by default. Bump deliberately via N8N_IMAGE_TAG in .env and
    # test before rolling out. `:latest` is avoided because a background
    # `docker compose pull` could drag in a breaking change.
    image: docker.n8n.io/n8nio/n8n:${N8N_IMAGE_TAG:-2.16.0}
    container_name: bb-homelab-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      # Bind only to localhost; public access goes through cloudflared.
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-https://localhost}
      - GENERIC_TIMEZONE=${TZ:-Europe/Paris}
      - TZ=${TZ:-Europe/Paris}
      # Encryption key is mandatory: it protects every credential n8n
      # stores. Fail fast at `docker compose up` if it's missing rather
      # than bringing up a stack whose future credentials would be
      # unrecoverable.
      - "N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set in .env -- generate with 'openssl rand -hex 32'}"
      # Disable telemetry and version checks.
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      # Default credentials prompt on first start (set via UI).
    volumes:
      # Host bind-mount on the HDD (Pattern Y for `appdata` services).
      # Migrated from the SD-card Docker named volume (issue #93). The
      # data lives at /mnt/appdata/n8n on the HDD (UUID-mounted per
      # fstab); explicit host path makes it visible in `df` and
      # trivially backed up.
      #
      # create_host_path: false is a fail-fast guard. The HDD is mounted
      # with `nofail` (fstab), so a failed mount lets the Pi boot WITHOUT
      # /mnt/appdata. With default bind semantics Docker would then
      # auto-create /mnt/appdata/n8n on the root filesystem and n8n would
      # silently start on an empty SQLite DB (data divergence). Refusing
      # to create the source path means the container fails to start
      # instead — including on reboot auto-restart, the riskiest moment.
      - type: bind
        source: /mnt/appdata/n8n
        target: /home/node/.n8n
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      # `default` keeps the existing MTU-tuned bridge for the
      # 127.0.0.1:5678 host binding used by cloudflared.
      # `proxy` is the shared external network on which Caddy reaches
      # n8n via DNS name `n8n:5678` (see services/caddy/ + ADR 0002).
      - default
      - proxy

  # Cloudflare Tunnel — exposes n8n through a public HTTPS URL.
  # network_mode: host so cloudflared uses the host's network stack
  # directly, avoiding Docker-bridge MTU/TLS handshake issues on some
  # environments. On host mode, it reaches n8n via 127.0.0.1:5678 (the
  # n8n service publishes on localhost).
  cloudflared:
    # Pinned by default. Bump via CLOUDFLARED_IMAGE_TAG in .env when a
    # newer release is needed.
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-2024.8.3}
    container_name: bb-homelab-cloudflared
    restart: unless-stopped
    network_mode: host
    depends_on:
      n8n:
        condition: service_healthy
    command: tunnel --no-autoupdate --url http://127.0.0.1:5678
    # The public URL is printed in the logs:
    #   docker compose logs cloudflared | grep trycloudflare.com

networks:
  default:
    driver: bridge
    driver_opts:
      # MTU reduced to 1450 to avoid silent packet drops on links with
      # lower effective MTU (common behind VPN, corporate proxies, WSL2,
      # some ADSL/VDSL modems). Cloudflare Tunnel's TLS handshake sends
      # large packets that would otherwise be fragmented and dropped.
      com.docker.network.driver.mtu: "1450"
  proxy:
    # Shared external network with services/caddy/. The reverse proxy
    # reaches n8n via DNS name `n8n` on this bridge. Created on the
    # host once with: `docker network create bb-homelab-proxy`
    # (see services/caddy/README.md and ADR 0002).
    name: bb-homelab-proxy
    external: true
