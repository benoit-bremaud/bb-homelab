name: Dependency Review

on:
  pull_request:
    # Run only when a dependency manifest / lockfile changes — keeps the check
    # off no-op PRs (docs, shell, compose). GitHub Actions are a dependency
    # ecosystem too, so workflow files are included: the SHA-pinned actions are
    # this repo's main dependencies today (Dependency Graph enabled 2026-06-16).
    # New language ecosystems fire automatically (e.g. brasse-bouillon #15/#16).
    paths:
      # GitHub Actions (SHA-pinned actions are dependencies)
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      # npm / pnpm / yarn
      - "**/package.json"
      - "**/package-lock.json"
      - "**/yarn.lock"
      - "**/pnpm-lock.yaml"
      # Python
      - "**/requirements.txt"
      - "**/Pipfile"
      - "**/Pipfile.lock"
      - "**/pyproject.toml"
      - "**/poetry.lock"
      # Go
      - "**/go.mod"
      - "**/go.sum"
      # Ruby
      - "**/Gemfile"
      - "**/Gemfile.lock"
      # Java / Kotlin (Maven, Gradle)
      - "**/pom.xml"
      - "**/build.gradle"
      - "**/build.gradle.kts"
      # Rust
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      # PHP
      - "**/composer.json"
      - "**/composer.lock"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Review dependency changes
    # Advanced Security is required for dependency review on private repos.
    # Gate on public visibility — flip will Just Work when repo goes public.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Run dependency review
        uses: actions/dependency-review-action@595b5aeba73380359d98a5e087f648dbb0edce1b  # v4.7.3
        with:
          fail-on-severity: high
